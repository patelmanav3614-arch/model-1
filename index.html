<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1>My Form...</h1>
       User Name: <input type="text" placeholder="Enter name here..." required>

        <br><br>
        Email: <input type="email" placeholder="Enter email here..." required>
        <br><br>
        Gender: <select name="" id="">
            <option value="Male">Male</option>
            <option value="Female">Female</option>

        </select>
        <br><br>
        <input type="submit" value="login">
        <input type="submit" value="Register">
        <br><br>
        
<label>text</label><br>
<input type="text" placeholder="Enter text"><br><br>

<label>Password</label><br>
<input type="password" placeholder="Enter password"><br><br>

<label>email</label><br>
<input type="email" placeholder="Enter email"><br><br>

<label>number</label><br>
<input type="number" min="1" max="100"><br><br>

<label>tel</label><br>
<input type="tel" placeholder="Phone number"><br><br>

<label>url</label><br>
<input type="url" placeholder="https://example.com"><br><br>

<label>search</label><br>
<input type="search" placeholder="Search..."><br><br>

<label>date</label><br>
<input type="date"><br><br>

<label>time</label><br>
<input type="time"><br><br>

<label>datetime</label><br>
<input type="datetime-local"><br><br>

<label>month</label><br>
<input type="month"><br><br>

<label>week</label><br>
<input type="week"><br><br>

<label>color</label><br>
<input type="color"><br><br>

<label>range</label><br>
<input type="range" min="0" max="100"><br><br>

<label>checkbox</label><br>
<input type="checkbox"><br><br>

<label>radio</label><br>
<input type="radio" name="gender"><br><br>

<label>file</label><br>
<input type="file"><br><br>

<label>hide</label><br>
<input type="hidden" value="secret"><br><br>

<label>submit</label><br>
<input type="submit" value="Submit"><br><br>

<label>reset</label><br>
<input type="reset"><br><br>

<label>button</label><br>
<input type="button" value="Click Me"><br><br>

<label>image</label><br>
<input type="image" src="button.png" alt="Submit"><br><br>

<label>text</label><br>
<input type="text" readonly value="Readonly text"><br><br>

<input type="text" disabled value="Disabled input"><br><br>
    </form>

</html>
