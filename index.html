<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1>My Form...</h1>
       User Name: <input type="text" placeholder="Enter name here..." required>
        <br><br>
       Password: <input type="password" placeholder="Enter password here..." required>
        <br><br>
        Email: <input type="email" placeholder="Enter email here..." required>
        <br><br>
        Gender: <select name="" id="">
            <option value="Male">Male</option>
            <option value="Female">Female</option>

        </select>
        <br><br>
        <input type="submit" value="login">
        <input type="submit" value="Register">
        <br><br>
        <!-- Text -->
<input type="text" placeholder="Enter text">

<!-- Password -->
<input type="password" placeholder="Enter password">

<!-- Email -->
<input type="email" placeholder="Enter email">

<!-- Number -->
<input type="number" min="1" max="100">

<!-- Telephone -->
<input type="tel" placeholder="Phone number">

<!-- URL -->
<input type="url" placeholder="https://example.com">

<!-- Search -->
<input type="search" placeholder="Search...">

<!-- Date -->
<input type="date">

<!-- Time -->
<input type="time">

<!-- Datetime Local -->
<input type="datetime-local">

<!-- Month -->
<input type="month">

<!-- Week -->
<input type="week">

<!-- Color Picker -->
<input type="color">

<!-- Range Slider -->
<input type="range" min="0" max="100">

<!-- Checkbox -->
<input type="checkbox">

<!-- Radio Button -->
<input type="radio" name="gender">

<!-- File Upload -->
<input type="file">

<!-- Hidden -->
<input type="hidden" value="secret">

<!-- Submit Button -->
<input type="submit" value="Submit">

<!-- Reset Button -->
<input type="reset">

<!-- Generic Button -->
<input type="button" value="Click Me">

<!-- Image Button -->
<input type="image" src="button.png" alt="Submit">

<!-- Readonly -->
<input type="text" readonly value="Readonly text">

<!-- Disabled -->
<input type="text" disabled value="Disabled input">
    </form>
</body>

</html>
