<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tag Elements</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: cursive;
        }
        header{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: blanchedalmond;
            height: 60px;
        }
        a{
            padding-right: 25px;
            text-decoration: none;
            color: black;
        }
        main{
           height: 87vh;
           
        }
        footer{
            text-align: center;
            background-color: blanchedalmond;
            color: black;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Login</a>
        </nav>
    </header>
        <main>

            <section>
                <h2>About Us</h2>
                <p>This is a section describing the website.</p>
            </section>

            <article>
                <h2>Blog Post</h2>
                <p>This is an article element for independent content.</p>
            </article>

            <aside>
                <h3>Related Links</h3>
                <p>Extra information goes here.</p>
            </aside>

        </main>

        <footer>
            &copy; 2026; This is a semantic tag program...
        </footer>
</body>

</html>
